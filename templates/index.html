<!DOCTYPE html>
<html>
<head>

<title>AI Question Answer</title>

<style>

body{
background:#0f2027;
font-family:Arial;
color:white;
}

.container{
display:flex;
}

.history{
width:25%;
background:#001f2f;
padding:20px;
height:100vh;
overflow:auto;
}

.main{
width:75%;
padding:40px;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
}

.card{
background:#2c3e50;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.low{
background:green;
padding:10px;
display:inline-block;
}

.medium{
background:orange;
padding:10px;
display:inline-block;
}

.high{
background:red;
padding:10px;
display:inline-block;
}

</style>

</head>


<body>

<div class="container">

<div class="history">

<h2>History</h2>

{% for h in history %}

<div class="card">

{{h.question}}

</div>

{% endfor %}

</div>


<div class="main">

<h1>AI Question Answer</h1>

<form method="POST" enctype="multipart/form-data">

<input name="question" placeholder="Ask question">

<input type="file" name="image" multiple>

<button type="submit">Ask</button>

</form>


{% if question %}

<div class="card">

<h3>Question</h3>

<p>{{question}}</p>

</div>

<div class="card">

<h3>Answer</h3>

<p>{{answer}}</p>

<div class="{{level}}">

Hallucination Score : {{score}} %

</div>

</div>

{% endif %}

</div>

</div>

</body>
</html>
