<!DOCTYPE html>
<html>
<head>

<title>AI Question Answer</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#021c2d;
padding:20px;
overflow-y:auto;
}

.sidebar h2{
margin-bottom:20px;
}

.history-item{
background:#2c3e50;
padding:12px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
color:white;
}

.history-item:hover{
background:#34495e;
}

/* Main section */

.main{
flex:1;
padding:40px;
}

.title{
font-size:34px;
margin-bottom:30px;
}

/* Form */

form{
display:flex;
gap:10px;
margin-bottom:20px;
}

input[type=text]{
flex:1;
padding:12px;
border-radius:6px;
border:none;
}

input[type=file]{
background:white;
color:black;
padding:6px;
border-radius:6px;
}

button{
padding:12px 22px;
background:#38bdf8;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

/* Cards */

.card{
background:#2c3e50;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.card h3{
margin-top:0;
}

/* Hallucination score */

.score-box{
margin-top:15px;
padding:10px;
border-radius:6px;
width:220px;
text-align:center;
font-weight:bold;
}

/* Colors */

.low{
background:#16a34a;
}

.medium{
background:#f59e0b;
}

.high{
background:#ef4444;
}

.logout{
margin-top:20px;
display:inline-block;
color:white;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->

<div class="sidebar">

<h2>History</h2>

{% for h in history %}

<a href="/history/{{loop.index0}}" style="text-decoration:none">

<div class="history-item">

{{h.question}}

</div>

</a>

{% endfor %}

</div>

<!-- Main Content -->

<div class="main">

<div class="title">AI Question Answer</div>

<form action="/chat" method="POST" enctype="multipart/form-data">

<input type="text" name="question" placeholder="Ask question">

<input type="file" name="image" multiple>

<button type="submit">Ask</button>

</form>


{% if question %}

<div class="card">

<h3>Question</h3>

<p>{{question}}</p>

</div>

{% endif %}


{% if answer %}

<div class="card">

<h3>Answer</h3>

<p>{{answer}}</p>

<div class="score-box {{level}}">

Hallucination Score: {{score}} %

</div>

</div>

{% endif %}


<a class="logout" href="/logout">Logout</a>

</div>

</div>

</body>
</html>
