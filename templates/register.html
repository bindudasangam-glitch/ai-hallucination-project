<!DOCTYPE html>
<html>

<head>
<title>Register</title>

<style>

body{
background:#0f2027;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#203a43;
padding:40px;
border-radius:10px;
}

input{
display:block;
margin-bottom:15px;
padding:10px;
width:250px;
}

button{
padding:10px;
width:100%;
background:#00bfff;
border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email">

<input type="password" name="password" placeholder="Password">

<button type="submit">Register</button>

</form>

<br>

<a href="/" style="color:white;">Back to Login</a>

</div>

</body>

</html>
